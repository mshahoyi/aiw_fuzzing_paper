<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Flow showing how a search over fuzzing hyperparameters on a cheap in-context secret proxy task selects top-K cells, which are then evaluated on the real sleeper-agent task and compared against the unfuzzed baseline, full-sweep mean, and oracle reference points.</desc>
